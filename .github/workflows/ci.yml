name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake gcc

      - name: Build
        run: cmake -B build && cmake --build build

      - name: Test
        run: ./build/test_betterr

      - name: Build with sanitizers
        run: cmake -B build_san -DCMAKE_C_FLAGS="-fsanitize=address,undefined -g" && cmake --build build_san

      - name: Test with sanitizers
        run: ./build_san/test_betterr